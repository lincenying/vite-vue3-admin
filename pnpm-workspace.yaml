# 控制是否以及如何将依赖项添加到默认目录中
catalogMode: prefer

# 是否忽略向工作区根目录添加依赖时的警告提示
ignoreWorkspaceRootCheck: true

# npm 包注册表的基本 URL（包括尾部斜杠）
registry: https://registry.npmmirror.com/
registries:
  default: https://registry.npmmirror.com/

# 定义了版本发布后 pnpm 安装之前必须经过的最少分钟数
minimumReleaseAge: 0

# 是否强制提升所有依赖
shamefullyHoist: true

# 在执行脚本时使用POSIX shell模拟器替代系统原生shell
shellEmulator: true

# 用于控制是否严格检查对等依赖（peer dependencies）的版本一致性。
# 当设置为 true 时，pnpm 会强制安装指定版本的对等依赖；
# 设置为 false 时，会忽略版本不一致的警告
strictPeerDependencies: false

# 当设置为“禁止降级”时，如果软件包的信任级别较之前的版本有所降低，pnpm 将无法安装
trustPolicy: no-downgrade

# 列出一个或多个 pnpm 应该允许安装的特定软件包或版本，即使这些软件包不满足信任策略要求。
trustPolicyExclude:
  - semver
  - chokidar
  - cached-factory

allowBuilds:
  esbuild: true
  oxc-resolver: true

catalogs:
  dev:
    '@lincy/unocss-base-config': ^2.7.3
    '@vitejs/plugin-vue': ^6.0.7
    '@vitejs/plugin-vue-jsx': ^5.1.5
    '@vue-macros/volar': ^3.1.2
    '@vue/compiler-sfc': ^3.5.35
    baseline-browser-mapping: ^2.10.33
    cross-env: ^10.1.0
    sass-embedded: ^1.100.0
    typescript: ^5.9.3
    unocss: ^66.7.0
    unplugin-auto-import: ^21.0.0
    unplugin-icons: ^23.0.1
    unplugin-vue-components: ^32.1.0
    vite: ^8.0.16
    vite-plugin-inspect: ^11.4.1
    vite-plugin-mock: ^3.0.2
    vite-plugin-progress: ^0.0.7
    vue-component-type-helpers: ^3.3.3
    vue-macros: ^3.1.2
    vue-tsc: ^3.3.3

  icons:
    '@iconify-json/ant-design': ^1.2.5
    '@iconify-json/el': ^1.2.2
    '@iconify-json/ep': ^1.2.4
    '@iconify-json/fa': ^1.2.2
    '@iconify-json/mdi': ^1.2.3

  lint:
    '@lincy/eslint-config': ^7.2.0
    '@lincy/stylelint-config': ^2.2.3
    '@unocss/eslint-plugin': ^66.7.0
    eslint: ^10.4.1
    eslint-plugin-format: ^2.0.1
    lint-staged: ^17.0.7
    stylelint: ^17.12.0

  prod:
    '@lincy/async-validation': ^1.4.0
    '@lincy/utils': ^0.7.3
    '@vueuse/core': ^14.3.0
    axios: ^1.17.0
    element-plus: ^2.14.1
    mockjs: ^1.1.0
    nprogress: ^0.2.0
    ofetch: ^1.5.1
    pinia: ^3.0.4
    qs: ^6.15.2
    throttle-debounce: ^5.0.2
    vue: ^3.5.35
    vue-router: ^5.1.0
    vuex: ^4.1.0
    xlsx: ^0.18.5

  types:
    '@types/node': ^25.9.1
    '@types/nprogress': ^0.2.3
    '@types/qs': ^6.15.1
    '@types/throttle-debounce': ^5.0.2

onlyBuiltDependencies:
  - esbuild
  - vue-demi
